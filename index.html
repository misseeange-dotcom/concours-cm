<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Add these 3 lines-->
         <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
         <meta http-equiv="Pragma" content="no-cache">
         <meta http-equiv="Expires" content="0">

         
        <title> Concours CM</title>
        <style>
            body {
                background-color: rgb(3, 122, 122);
                color:white;
                font-family: Arial, sans-serif;
                text-align: center;
                padding: 50px;
            }
            h1 {color: #f5a623;
            font-size: 40px;}
            p {
                font: size 18px;
                color: #cccccc;
            }
            nav a:hover {
                background-color: #f5a623;
                color: white;
            }
            nav {
                margin-top: 30px;
            }
            nav a {
                color: white;
                background: transparent;
                padding: 12px 25px;
                border-radius: 30px;
                margin: 5px;
                text-decoration: none;
                font-weight: bold;
                font-size: 15px;
                transition: all 0.3s ease;
                border: 2px solid #f5a623;
            }
            #lang-switcher
            { position:fixed ;
            top: 15px;
             right:15px ;}
             .lang-btn {
                background-color: white;
                color: black;
                border:none;
                padding: 8px 15px;
                margin: 2px;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
             }
             .lang-btn:hover {
                background-color: grey;
             }
             .dropdown {
                position: relative;
                display: inline-block;
             }
             .dropdown-btn {
                background: transparent;
                color: #f5a623;
                padding: 12px 25px;
                border-radius: 30px;
                font-weight: bold;
                font-size: 15px;
                cursor: pointer;
                transition: all 0.3s ease;

             }
              .dropdown-btn:hover {
                background: #f5a523;
                color: white;
              }
              .dropdown-menu {
                display: none;
                position: absolute;
                top: 110%;
                left: 0;
                background: white;
                border-radius: 10px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.15);
                min-width: 160px;
                z-index: 100;
                overflow: hidden;
              }
              .dropdown-menu.open {
                display: block;
                animation: slideDown 0.3s ease;
              }
              @keyframes slidedown { 
                from {
                    opacity: 0;
                    tramsform: translateY(-10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
              } 
              .dropdown-menu a {
                display: block;
                padding: 12px 20px;
                color: #1a1a2e;
                text-decoration: none;
                border-bottom: 1px solid #f0f0f0;
                transition: all 0.3s ease;
                border-radius: 0;
                border:none;
                width: 100%;
                text-align: left;
              }
              .dropdown-menu a:hover {
                background: #f5a623;
                color: white;
                padding-left: 30px; 
              }

            @media (max-width: 768px){
                h1 {
                    font-size: 24px;
                }
                p {
                    font-size: 14px;
                }
                nav a {
                    display:block;
                    margin: 8px auto;
                    width: 80%;
                }
                .card {
                    width: 90%;
                }
                .subject-row {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 8px;
                }
            }
            @media (max-width: 1024px) {
                .card {
                    width: 75%;
                }
            }
            @media (max-width:480px) {
                h1 {
                    font-size: 20px;
                }
                nav a {
                    width: 95%;
                }
            }
        </style>
    </head>
    <body>

        
        <h1 id="title">Bienvenue sur Concours CM</h1>
        <p id="subtitle">la plateform des annales de concours au cameroun.</p>
        <div id="lang-switcher">
            <button onclick="setlang('fr')" class="lang-btn">FR</button>
            <button onclick="setlang('en')" class="lang-btn">EN</button>
        </div><nav>
            <a href="index.html" id="nav_home">Accueil</a>
            <div class="dropdown">
                <button class="dropdown-btn" id="dl1" onclick="toggleDropdown()">
                    Concours &#9660;
                </button>
                <div class="dropdown-menu" id="dropdownMenu">
            <a href="douanes.html " id="nav_douanes" >Douanes</a>
            <a href="enam.html" id="nav_enam">Enam</a>
            <a href="hospitalier.html" id="nav_hospitalier" >Hospitalier</a>
        </div>
    </div>
            <a href="contact.html" id="nav_contact">Contact</a>
            
        </nav>
        
    </body>
    <script>
      let   translations = {
       fr: {
        title: "Bienvenue sur Concours CM",
        subtitle: "la plateform des annales concours au cameroun",
        nav_home: "Accueil",
        nav_douanes: "Douanes",
        nav_enam:"Enam",
        nav_hospitalier:"Hospitalier",
        nav_contact:"Contact",
        dl1:"Concours"
    },
        en: {
        title:"welcome to Concours CM",
        subtitle:"the exam papers plateform",
        nav_home:"Home",
        nav_douanes:"Customs",
        nav_enam:"Enam",
        nav_hospitalier:"Hospital",
        nav_contact:"Contact",
        dl1:"Exams"
        },
    };
        function setlang(lang) {
        document.getElementById('title').textContent= translations[lang].title;
        document.getElementById('subtitle').textContent= translations[lang].subtitle;
        document.getElementById('nav_home').textContent= translations[lang].nav_home;
        document.getElementById('nav_douanes').textContent=translations[lang].nav_douanes;
        document.getElementById('nav_enam').textContent=translations[lang].nav_enam;
        document.getElementById('nav_hospitalier').textContent=translations[lang].nav_hospitalier;
        document.getElementById('nav_contact').textContent=translations[lang].nav_contact;
        document.getElementById('dl1').textContent=translations[lang].dl1;
        }
        function toggleDropdown() {
            let menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown')) {
                document.getElementById('dropdownMenu').classList.remove('open');
            }
        });
            
            </script>
