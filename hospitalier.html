<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Add these 3 lines-->
         <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
         <meta http-equiv="Pragma" content="no-cache">
         <meta http-equiv="Expires" content="0">
        <title>Hospitalier Concours - CM</title>
    <style>
        body {
            background-color: rgb(3,122,122);
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            padding: 50px;
        }
        h1 {
            color: #f5a623;
            font-size: 36px;
        }
        h2 {
            color: white;
        }
        p {
            color: #cccccc;
        }
        nav a:hover {
            background-color: #f5a623;
        }
        nav {
            margin-top: 20px;
        }
        nav a {
            background: transparent;
            padding: 12px 25px;
            border-radius: 30px;
            margin: 5px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border: 2px solid #f5a623;
            transition: all 0.3s ease;
        }
        .card {
            background-color: rgb(93,153,153);
            padding: 20px;
            width: 40%;
            border-radius: 10px;
            margin: 20px auto;
        }
        .subject-row {
            align-items: center;
            margin: 0px 0px;
            justify-content: space-between;
            display: flex;
        }
        .download-btn {
            padding: 8px 20px;
            border: 2px solid #f5a623;
            background:transparent;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 14px;
        }
        .download-btn:hover {
            background-color: #f5a623;
        }
        #lang-switcher
            { position:fixed ;
            top: 15px;
             right:15px ;}
             .lang-btn {
                background-color: white;
                color: black;
                border:none;
                padding: 8px 15px;
                margin: 2px;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
             }
             .lang-btn:hover {
                background-color: grey;
             }
             
              .logout-button {
                background:transparent ;
                color: #ff4444;
                font-weight: bold;
                font-family: arial,sans-serif;
                padding: 8px 18px;
                border-radius: 30px;
                transition: all 0.3s ease;
                cursor: pointer;
                font-size: 13px;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 1000;
                border: 2px solid #ff4444;

              }
              .logout-button:hover {
                background-color: #ff4444;
                color: white;
              }
             @media (max-width:480px) {
                h1 {
                    font-size: 20px;
                }
                nav a {
                    width: 95%;
                }
            
            .logout-button {
                padding: 6px 14px;
                font-size: 12px;
            }
            }
        @media (max-width: 1024px){
            .card {
                width: 75%;
            }
        }
        @media (max-width: 768px){
            h1 {
                font-size: 24px;
            }
            p {
                font-size: 14px;
            }
            h2 {
                font-size: 20px;
            }
            nav a {
                display: block;
                margin:5px auto;
                width: 80%;
                font-size: 15px;
                padding: 12px 15px;

            }
            .download-btn {
                padding: 10px 20px;
                font-size: 15px;
            }
            .card {
                width: 90%;
            }
            .subject-row {
                flex-direction: column;
                align-items: flex-start;
                gap:8px;
            }
        }
    </style></head>
    <body>
        <h1 id="title">Concours d'hospitalier</h1>
        <p id="subtitle">Annales des concours d'hospitalier du cameroun.</p>
         <div id="lang-switcher">
            <button onclick="setlang('fr')" class="lang-btn">FR</button>
            <button onclick="setlang('en')" class="lang-btn">EN</button>
            <button class="logout-button" onclick="logout()">Se deconnecter</button>
      </div>
        <nav>
            <a href="index.html" id="nav_home">Accueil</a>
            <a href="douanes.html" id="nav_douanes">Douanes</a>
            <a href="enam.html" id="nav_enam">Enam</a>
            <a href="hospitalier.html" id="nav_hospitalier">Hospitalier</a>
            <a href="contact.html" id="nav_contact">Contact</a>
        </nav>
        <div class="card">
        <h2 id="papers">Annales disponible</h2>
        <div class="subject-row">
        <p id="sub1">sujet2023 - SVT(biologie)</p>
        <a href="#" class="download-btn" id="dl1">Telecharger</a></div>
        <div class="subject-row">
        <p id="sub2">sujet2022 - chimie</p>
        <a href="#" class="download-btn" id="dl2">Telecharger</a></div>
        <div class="subject-row">
        <p id="sub3">sujet2021 - Mathematiques</p>
        <a href="#" class="download-btn" id="dl3">Telecharger</a>
        </div>
    </body>
    <script>
    let user = localStorage.getItem('user');
        if (!user) {
            window.location.href = 'login.html';
        }
       function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';}
      let   translations = {
       fr: {
        title: "Concours d'hospitalier",
        subtitle: "Annales et resources pour le concours de l'enam",
        papers:"Annales disponoble",
        nav_home: "Accueil",
        nav_douanes: "Douanes",
        nav_enam:"Enam",
        nav_hospitalier:"Hospitalier",
        nav_contact:"Contact", 
        sub1:"sujet 2023 - Culture general",
        dl1:"Telecharger",
        sub2:"sujet 2022 - Mathematiques",
        dl2:"Telecharger",
        sub3:"sujet 2021 - Economie",
        dl3:"Telecharger",
    },
        
        en: {
        title:"Enam examination",
        subtitle:"past papers and resources for Enam",
        papers:"Available papers",
        nav_home:"Home",
        nav_douanes:"Customs",
        nav_enam:"Enam",
        nav_hospitalier:"Hospital",
        nav_contact:"Contact",
        sub1:"2023 subject - General knwoledge",
        dl1:"Download",
        sub2:"2022 subject - Mathematics",
        dl2:"Download",
        sub3:"2021 subject - Economics",
        dl3:"Download",
        },
    };
        function setlang(lang) {
        document.getElementById('title').textContent= translations[lang].title;
        document.getElementById('subtitle').textContent= translations[lang].subtitle;
        document.getElementById('nav_home').textContent= translations[lang].nav_home;
        document.getElementById('nav_douanes').textContent=translations[lang].nav_douanes;
        document.getElementById('nav_enam').textContent=translations[lang].nav_enam;
        document.getElementById('nav_hospitalier').textContent=translations[lang].nav_hospitalier;
        document.getElementById('nav_contact').textContent=translations[lang].nav_contact;
        document.getElementById('papers').textContent=translations[lang].papers;
        document.getElementById('sub1').textContent=translations[lang].sub1;
        document.getElementById('dl1').textContent=translations[lang].dl1;
        document.getElementById('sub2').textContent=translations[lang].sub2;
        document.getElementById('dl2').textContent=translations[lang].dl2;
        document.getElementById('sub3').textContent=translations[lang].sub3;
        document.getElementById('dl3').textContent=translations[lang].dl3;
    } </script>
