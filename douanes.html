<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Add these 3 lines-->
         <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
         <meta http-equiv="Pragma" content="no-cache">
         <meta http-equiv="Expires" content="0">

        <title>Douanes-concours CM</title>
    <style>
        body {
            background-color: rgb(3,122,122);
            font-family:Arial, sans-serif ;
            padding: 50px;
            color:white;
            text-align: center;
        }
        h1 {
            color: #f5a623;
            font-size: 36px;
        }
        h2 {
            color: white;
        }
        p {
            color:#cccccc;
        }
        nav {
            margin-top: 20px;
        }
        nav a {
            color: white;
            background: transparent;
            padding: 12px 25px;
            text-decoration: none;
            margin: 5px;
            border-radius: 30px;
            font-weight: bold;
            border: 2px solid #f5a623;
            transition: all 0.3s ease ;
        }
        nav a:hover {
            background-color: #f5a623;
        }
        
        .card{
            background-color: rgb(93, 153, 153);
            padding: 20px;
            margin: 20px auto;
            width: 40%;
            border-radius: 20px;
        }
        .subject-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0px 0px;
        }
        .download-btn {
            background:transparent ;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #f5a623;
            min-width: 90px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background-color:#f5a623;
        }
         #lang-switcher
            { position:fixed ;
            top: 15px;
             right:15px ;}
             .lang-btn {
                background-color: white;
                color: black;
                border:none;
                padding: 8px 15px;
                margin: 2px;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
             }
             .lang-btn:hover {
                background-color: grey;
             }
             
         @media (max-width: 1024px){
            .card {
                width: 75%;
            }
        }
        @media (max-width: 768px){
            h1 {
                font-size: 24px;
            }
            h2 {
                font-size: 20px;
            }
            p {
                font-size: 14px;
            }
            nav a {
                display: block;
                margin:5px auto;
                width: 80%;
                padding: 12px 20px;
                font-size: 15px;

            }
            .download-btn {
                padding: 10px 20px ;
                font-size: 15px;
            }
            .card {
                width: 90%;
            }
            .subject-row {
                flex-direction: column;
                align-items: flex-start;
                gap:8px;
            }
        }
        @media (max-width:480px){
            h1 {
                font-size: 20px;
            }
            nav a {
                width: 90px;
            }
        }
    </style>
</head>
<body>
    <h1 id="title">Concours des Douanes</h1>
    <p id="subtitle">annales et resources pour le concours des Douanes du Cameroun.</p>
    <div id="lang-switcher">
            <button onclick="setlang('fr')" class="lang-btn">FR</button>
            <button onclick="setlang('en')" class="lang-btn">EN</button>
      </div>
    <nav>
       <a href="index.html" id="nav_home">Accueil</a>
            <a href="Douanes.html" id="nav_douanes">Douanes</a>
            <a href="enam.html" id="nav_enam">Enam</a>
            <a href="hospitalier.html" id="nav_hospitalier">Hospitalier</a>
            <a href="contact.html" id="nav_contact">Contact</a>
              
    </nav>
    <div class="card">
        <h2  id="papers" >Annales disponible</h2>
        <div class="subject-row">
        <p id="sub1">sujet 2023 - Culture generale</p>
        <a href="#" class="download-btn" id="dl1">Telecharger</a></div> 
        <div class="subject-row">  
        <p id="sub2">sujet 2022 - Mathematiques</p>
        <a href="#" class="download-btn" id="dl2">Telecharger</a></div>
        <div class="subject-row">
        <p id="sub3">sujet 2021 - Droit</p>
        <a href="#" class="download-btn" id="dl3">Telecharer</a>    </div>
    </div>
</body>
</html>
 <script>
      let   translations = {
       fr: {

        nav_douanes: "Douanes",
        nav_enam:"Enam",
        nav_hospitalier:"Hospitalier",

        sub1:"sujet 2023 - Culture general",
        dl1:"Telecharger",
        sub2:"sujet 2022 - Mathematiques",
        dl2:"Telecharger",

        function setlang(lang) {
        document.getElementById('title').textContent= translations[lang].title;
        document.getElementById('subtitle').textContent= translations[lang].subtitle;
        document.getElementById('nav_home').textContent= translations[lang].nav_home;
        document.getElementById('nav_douanes').textContent=translations[lang].nav_douanes;
        document.getElementById('nav_enam').textContent=translations[lang].nav_enam;
        document.getElementById('nav_hospitalier').textContent=translations[lang].nav_hospitalier;
        document.getElementById('nav_contact').textContent=translations[lang].nav_contact;
        document.getElementById('papers').textContent=translations[lang].papers;
        document.getElementById('sub1').textContent=translations[lang].sub1;
        document.getElementById('dl1').textContent=translations[lang].dl1;
        document.getElementById('sub2').textContent=translations[lang].sub2;
        document.getElementById('dl2').textContent=translations[lang].dl2;
        document.getElementById('sub3').textContent=translations[lang].sub3;
        document.getElementById('dl3').textContent=translations[lang].dl3;
    }
    </script>
